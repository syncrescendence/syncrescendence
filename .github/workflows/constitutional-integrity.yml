name: Constitutional Integrity

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'AGENTS.md'
      - 'Makefile'
      - '.github/workflows/constitutional-integrity.yml'
      - 'operators/**'
      - 'orchestration/**'
      - 'communications/**'
      - 'playbooks/**'
      - 'program/**'
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate constitutional sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile tracked Python scripts
        env:
          PYTHONPYCACHEPREFIX: /tmp/pycache
        run: |
          python3 - <<'PY'
          import py_compile
          import subprocess
          import sys

          files = subprocess.check_output(["git", "ls-files", "*.py"], text=True).splitlines()
          failures = []
          for path in files:
              try:
                  py_compile.compile(path, doraise=True)
              except Exception as exc:
                  failures.append((path, str(exc)))
          if failures:
              for path, exc in failures:
                  print(f"{path}: {exc}")
              sys.exit(1)
          print(f"Compiled {len(files)} python files.")
          PY

      - name: Artifact law inventory check
        run: |
          make check-artifact-law

      - name: Render effective harness registry
        run: |
          make harness-registry-effective

      - name: Verify generated artifacts are committed
        run: |
          git diff --exit-code -- \
            orchestration/state/ARTIFACT-LAW-INVENTORY.json \
            orchestration/state/ARTIFACT-LAW-INVENTORY.md \
            orchestration/state/HARNESS-CAPABILITY-REGISTRY-CC79-EFFECTIVE.json \
            orchestration/state/impl/HARNESS-CAPABILITY-REGISTRY-CC79-EFFECTIVE.md \
            orchestration/state/impl/HARNESS-PROMOTION-CANDIDATES-CC79-EFFECTIVE.md
